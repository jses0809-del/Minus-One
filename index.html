<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Master Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+TC:wght@500;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #0f172a; color: white; overflow-x: hidden; }
        .bingo-title { font-family: 'Black Han Sans', sans-serif; text-shadow: 4px 4px 0px #3b82f6; }
        #game-board { display: grid; gap: 6px; margin: 0 auto; transition: all 0.5s ease; }
        .cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-weight: 900; background: #1e293b; border: 1px solid #334155; position: relative; }
        .cell:hover { border-color: #60a5fa; background: #1e2945; }
        .cell.marked { background: #ef4444 !important; border-color: #f87171; color: white; }
        .cell.last-move::after { content: ''; position: absolute; inset: -3px; border: 3px solid #fbbf24; border-radius: 8px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="p-4">

    <div id="app" class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-5xl bingo-title italic">BINGO</h1>
            <div id="user-area" class="hidden flex items-center gap-3 bg-slate-800 p-2 px-4 rounded-full border border-slate-700">
                <span id="user-name" class="font-bold text-sm"></span>
                <button id="btn-logout" class="text-xs text-red-400 hover:text-red-300 underline">登出</button>
            </div>
        </div>

        <div id="login-section" class="text-center py-20 bg-slate-800 rounded-3xl border-4 border-slate-700">
            <button id="btn-login" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-4 rounded-xl font-black text-xl">Google 登入</button>
        </div>

        <div id="room-section" class="hidden grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 space-y-4">
                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                    <p class="text-blue-400 font-black mb-4">⚙️ 遊戲設定 (房主可改)</p>
                    <div id="host-controls" class="space-y-3">
                        <div>
                            <label class="text-xs text-slate-400">網格大小</label>
                            <select id="select-size" class="w-full bg-slate-900 border border-slate-600 p-2 rounded-lg">
                                <option value="3">3 x 3</option>
                                <option value="5" selected>5 x 5</option>
                                <option value="7">7 x 7</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-xs text-slate-400">數字範圍 (1 ~ <span id="min-hint" class="text-yellow-500 font-bold">25</span>+)</label>
                            <input id="input-max-num" type="number" value="25" min="25" class="w-full bg-slate-900 border border-slate-600 p-2 rounded-lg">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400">勝利線數</label>
                            <select id="select-goal" class="w-full bg-slate-900 border border-slate-600 p-2 rounded-lg"></select>
                        </div>
                        <button id="btn-start" class="w-full bg-emerald-600 py-3 rounded-xl font-black hover:bg-emerald-500 mt-2 transition-all shadow-lg">開始遊戲</button>
                    </div>
                    <div id="guest-msg" class="hidden text-center p-4 text-slate-500 italic">等待房主設定中...</div>
                </div>

                <div class="bg-slate-800 p-5 rounded-2xl border border-slate-700">
                    <p class="text-xs font-bold text-slate-500 mb-3">玩家列表</p>
                    <div id="player-list" class="space-y-2"></div>
                </div>
            </div>

            <div class="lg:col-span-8 flex flex-col gap-4">
                <div class="bg-slate-800 p-4 rounded-xl flex justify-between items-center border border-slate-700">
                    <div id="turn-display" class="font-black text-xl text-slate-400">準備中...</div>
                    <button id="btn-ai" class="hidden bg-purple-600 text-xs px-4 py-2 rounded-lg font-bold hover:bg-purple-500 transition-all">AI 自動選號</button>
                </div>
                
                <div id="game-board" class="pointer-events-none opacity-20"></div>

                <div id="game-logs" class="bg-slate-900/50 p-4 rounded-xl h-24 overflow-y-auto text-xs font-mono text-slate-500 border border-slate-800">
                    <div>> 戰報系統就緒...</div>
                </div>
            </div>
        </div>
        
        <div id="lobby-section" class="hidden space-y-4 max-w-md mx-auto">
            <button id="btn-create" class="w-full bg-blue-600 p-6 rounded-2xl text-xl font-black shadow-lg">創建房間</button>
            <div class="flex gap-2">
                <input id="input-room-id" type="text" placeholder="輸入8位代碼" class="flex-grow bg-slate-800 border-2 border-slate-700 p-4 rounded-xl text-center font-mono">
                <button id="btn-join" class="bg-white text-black px-6 rounded-xl font-bold">加入</button>
            </div>
        </div>
    </div>

    <div id="countdown-overlay" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center text-9xl font-black hidden"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // --- 請填入你的 Firebase Config ---
    const firebaseConfig = {
        apiKey: "AIzaSyBdt75NPrgmYs0rw1KQv_sRfYdFwQimo1c",
        authDomain: "bingo-f3e9d.firebaseapp.com",
        projectId: "bingo-f3e9d",
        storageBucket: "bingo-f3e9d.firebasestorage.app",
        messagingSenderId: "952702149326",
        appId: "1:952702149326:web:883681422e33337b26669f"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    let user = null, roomId = null, board = [], isMyTurn = false;

    // --- 安全檢查與邏輯 ---
    const selectSize = document.getElementById('select-size');
    const inputMaxNum = document.getElementById('input-max-num');
    const minHint = document.getElementById('min-hint');

    function updateConstraints() {
        const size = parseInt(selectSize.value);
        const min = size * size;
        minHint.innerText = min;
        inputMaxNum.setAttribute('min', min);
        if (parseInt(inputMaxNum.value) < min) {
            inputMaxNum.value = min;
        }
        
        // 更新連線目標選項
        const goalSelect = document.getElementById('select-goal');
        goalSelect.innerHTML = '';
        for (let i = 1; i <= size + 2; i++) {
            let opt = new Option(`${i} 條連線`, i);
            if (i === 3) opt.selected = true;
            goalSelect.add(opt);
        }
    }

    selectSize.onchange = updateConstraints;
    updateConstraints();

    // --- 認證流程 ---
    onAuthStateChanged(auth, u => {
        if (u) { user = u; showSection('lobby-section'); document.getElementById('user-area').classList.remove('hidden'); document.getElementById('user-name').innerText = u.displayName; }
        else { showSection('login-section'); document.getElementById('user-area').classList.add('hidden'); }
    });
    document.getElementById('btn-login').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('btn-logout').onclick = () => signOut(auth);

    // --- 房間管理 ---
    document.getElementById('btn-create').onclick = async () => {
        const id = Math.random().toString().slice(2, 10);
        await set(ref(db, `rooms/${id}`), {
            host: user.uid, status: 'waiting', 
            settings: { size: 5, goal: 3, maxNum: 25 },
            called: [0], turnIdx: 0, order: [user.uid],
            players: { [user.uid]: { name: user.displayName } }
        });
        join(id);
    };

    document.getElementById('btn-join').onclick = () => join(document.getElementById('input-room-id').value);

    async function join(id) {
        const snap = await get(ref(db, `rooms/${id}`));
        if (!snap.exists()) return alert("房間不存在");
        roomId = id;
        await update(ref(db, `rooms/${id}/players/${user.uid}`), { name: user.displayName });
        const d = snap.val();
        if (!d.order.includes(user.uid)) {
            await update(ref(db, `rooms/${id}`), { order: [...d.order, user.uid] });
        }
        showSection('room-section');
        listen();
    }

    // --- 核心遊戲流程 ---
    function listen() {
        onValue(ref(db, `rooms/${roomId}`), snap => {
            const d = snap.val(); if (!d) return;
            const isHost = d.host === user.uid;
            
            document.getElementById('host-controls').classList.toggle('hidden', !isHost || d.status !== 'waiting');
            document.getElementById('guest-msg').classList.toggle('hidden', isHost || d.status !== 'waiting');

            // 玩家清單
            document.getElementById('player-list').innerHTML = d.order.map(uid => `
                <div class="flex justify-between p-2 px-4 rounded-lg bg-slate-900/50 border border-slate-700">
                    <span class="text-sm font-bold ${d.order[d.turnIdx] === uid && d.status === 'playing' ? 'text-blue-400' : ''}">${d.players[uid].name}</span>
                </div>
            `).join('');

            if (d.status === 'countdown') {
                document.getElementById('countdown-overlay').classList.remove('hidden');
                document.getElementById('countdown-overlay').innerText = "READY";
            }

            if (d.status === 'playing') {
                document.getElementById('countdown-overlay').classList.add('hidden');
                if (board.length === 0) {
                    // 初始化盤面時，強制根據房主設定的範圍取值
                    let pool = Array.from({length: d.settings.maxNum}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
                    board = pool.slice(0, d.settings.size * d.settings.size);
                    const gb = document.getElementById('game-board');
                    gb.style.gridTemplateColumns = `repeat(${d.settings.size}, 1fr)`;
                    gb.style.maxWidth = `${d.settings.size * 70}px`;
                }
                
                document.getElementById('game-board').classList.remove('pointer-events-none', 'opacity-20');
                isMyTurn = d.order[d.turnIdx] === user.uid;
                const td = document.getElementById('turn-display');
                td.innerText = isMyTurn ? "🔥 輪到你了！" : "⌛ 對手考慮中...";
                td.className = isMyTurn ? "font-black text-xl text-yellow-400 animate-pulse" : "font-black text-xl text-slate-500";
                document.getElementById('btn-ai').classList.toggle('hidden', !isMyTurn);
                
                render(d);
                check(d);
            }

            if (d.status === 'ended') {
                document.getElementById('turn-display').innerText = `🏆 贏家: ${d.winner}`;
                document.getElementById('turn-display').className = "font-black text-2xl text-emerald-400";
                document.getElementById('game-board').classList.add('pointer-events-none');
            }
        });
    }

    function render(d) {
        const gb = document.getElementById('game-board');
        gb.innerHTML = '';
        board.forEach(n => {
            const div = document.createElement('div');
            const called = d.called.includes(n);
            div.className = `cell ${called ? 'marked' : ''} ${d.lastMove === n ? 'last-move' : ''}`;
            div.style.fontSize = d.settings.size > 5 ? '0.8rem' : '1.2rem';
            div.innerText = n;
            div.onclick = () => {
                if (isMyTurn && !called) {
                    const next = (d.turnIdx + 1) % d.order.length;
                    update(ref(db, `rooms/${roomId}`), { called: [...d.called, n], turnIdx: next, lastMove: n });
                }
            };
            gb.appendChild(div);
        });
    }

    function check(d) {
        const s = parseInt(d.settings.size), goal = parseInt(d.settings.goal);
        let lines = 0, m = [];
        for(let i=0; i<s; i++) m[i] = board.slice(i*s, i*s+s).map(n => d.called.includes(n));
        for(let i=0; i<s; i++) {
            if (m[i].every(v => v)) lines++;
            if (m.map(r => r[i]).every(v => v)) lines++;
        }
        if (Array.from({length: s}, (_, i) => m[i][i]).every(v => v)) lines++;
        if (Array.from({length: s}, (_, i) => m[i][s-1-i]).every(v => v)) lines++;
        if (lines >= goal) update(ref(db, `rooms/${roomId}`), { status: 'ended', winner: user.displayName });
    }

    document.getElementById('btn-start').onclick = () => {
        const s = parseInt(selectSize.value);
        const m = parseInt(inputMaxNum.value);
        if (m < s * s) return alert("數字不夠填滿盤面！");
        update(ref(db, `rooms/${roomId}`), {
            status: 'playing',
            settings: { size: s, goal: document.getElementById('select-goal').value, maxNum: m }
        });
    };

    document.getElementById('btn-ai').onclick = () => {
        const uncalled = board.filter(n => !document.querySelector(`.cell.marked:nth-child(${board.indexOf(n)+1})`));
        if (uncalled.length > 0) {
            const pick = uncalled[Math.floor(Math.random() * uncalled.length)];
            document.querySelector(`.cell:nth-child(${board.indexOf(pick)+1})`).click();
        }
    };

    function showSection(id) {
        ['login-section', 'lobby-section', 'room-section'].forEach(s => document.getElementById(s).classList.toggle('hidden', s !== id));
    }
</script>
</body>
</html>
